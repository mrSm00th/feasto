<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{% block title %}KartFlow Dev{% endblock %}</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    input { display: block; width: 100%; padding: 8px; margin: 4px 0 12px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #3399cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-all; background: #f7f7f7; padding: 8px; border-radius: 4px; }
    label { font-weight: 600; font-size: 13px; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
